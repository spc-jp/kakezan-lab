<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ビジネス掛け算ラボ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
    :root {
        /* クレイモーフィズム用 カラーパレット */
        --bg:          #e0e5ec;
        --text:        #4a5568;
        --text-sub:    #718096;
        --text-dim:    #a0aec0;
        
        --primary:     #7f9cf5;
        --teal:        #4fd1c5;
        --gold:        #ed8936;
        --blue:        #63b3ed;
        --rose:        #fc8181;

        /* シャドウ用カラー */
        --shadow-light: rgba(255, 255, 255, 0.9);
        --shadow-dark:  rgba(163, 177, 198, 0.6);

        /* クレイモーフィズム シャドウ定義 */
        /* カード用：大きくぷっくりとした出っ張り */
        --clay-card: 
            12px 12px 24px var(--shadow-dark), 
            -12px -12px 24px var(--shadow-light),
            inset -4px -4px 16px rgba(163, 177, 198, 0.15),
            inset 4px 4px 16px rgba(255, 255, 255, 0.7);

        /* ボタン用：小さめの出っ張り */
        --clay-btn: 
            6px 6px 16px var(--shadow-dark), 
            -6px -6px 16px var(--shadow-light),
            inset -2px -2px 8px rgba(163, 177, 198, 0.15),
            inset 2px 2px 8px rgba(255, 255, 255, 0.7);

        /* ボタン用（押した時）：へこみ */
        --clay-btn-active: 
            inset 4px 4px 8px var(--shadow-dark), 
            inset -4px -4px 8px var(--shadow-light);

        /* 入力フォーム用：深いへこみ */
        --clay-input: 
            inset 5px 5px 10px var(--shadow-dark), 
            inset -5px -5px 10px var(--shadow-light),
            -1px -1px 2px rgba(255,255,255,0.5),
            1px 1px 2px rgba(163,177,198,0.3);

        --radius-lg:   24px;
        --radius-md:   16px;
        --radius-sm:   12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Noto Sans JP', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding-bottom: 100px;
        -webkit-font-smoothing: antialiased;
    }

    /* ─ Header ─ */
    .site-header {
        padding: 40px 20px 30px;
        text-align: center;
        position: relative;
    }
    .header-kamon { font-size: 36px; display: block; margin-bottom: 12px; filter: drop-shadow(4px 4px 6px rgba(163, 177, 198, 0.5)); }
    .header-en { font-size: 11px; font-weight: 700; letter-spacing: 0.25em; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; display: block; }
    .site-header h1 { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: 0.08em; margin-bottom: 8px; }
    .site-header .tagline { font-size: 13px; font-weight: 500; color: var(--text-sub); letter-spacing: 0.05em; }
    .header-rule { display: flex; align-items: center; gap: 12px; justify-content: center; margin-top: 20px; }
    .header-rule span { display: block; height: 3px; width: 40px; border-radius: 10px; box-shadow: var(--clay-input); }
    .header-rule i { font-style: normal; font-size: 12px; color: var(--primary); letter-spacing: 0.15em; filter: drop-shadow(2px 2px 2px rgba(163, 177, 198, 0.3)); }

    /* ─ Layout ─ */
    .container { max-width: 600px; margin: 0 auto; padding: 10px 20px; position: relative; z-index: 1; }

    /* ─ Step label ─ */
    .step-label { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-left: 4px; }
    .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); box-shadow: var(--clay-btn); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: var(--primary); flex-shrink: 0; }
    .step-text { font-size: 13px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.08em; }

    /* ─ Input card ─ */
    .input-card { background: var(--bg); border-radius: var(--radius-lg); padding: 28px 24px 24px; margin-bottom: 30px; box-shadow: var(--clay-card); }
    .random-row { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .btn-random { background: var(--bg); color: var(--text-sub); border: none; padding: 10px 18px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.04em; box-shadow: var(--clay-btn); transition: transform 0.1s, color 0.2s; }
    .btn-random:hover { color: var(--primary); }
    .btn-random:active { box-shadow: var(--clay-btn-active); transform: scale(0.96); }
    
    .industry-row { display: grid; grid-template-columns: 1fr 36px 1fr; gap: 12px; align-items: end; margin-bottom: 24px; }
    .times-wrap { display: flex; align-items: center; justify-content: center; padding-bottom: 12px; }
    .times-symbol { font-size: 24px; font-weight: 900; color: var(--text-dim); text-shadow: 2px 2px 4px rgba(163,177,198,0.5); }
    .field-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 10px; letter-spacing: 0.05em; margin-left: 4px; }
    .select-wrap { position: relative; }
    .select-wrap::after { content: '▾'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--primary); font-size: 14px; font-weight: 900; filter: drop-shadow(1px 1px 1px rgba(255,255,255,0.8)); }
    select { width: 100%; padding: 14px 36px 14px 16px; border: none; border-radius: var(--radius-md); font-size: 15px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; background: var(--bg); color: var(--text-sub); appearance: none; -webkit-appearance: none; cursor: pointer; box-shadow: var(--clay-input); transition: outline 0.2s; }
    select:focus { outline: 3px solid rgba(127,156,245,0.4); outline-offset: -2px; }
    select.selected { color: var(--text); font-weight: 700; }
    
    .memo-field { margin-top: 10px; }
    .memo-field label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; letter-spacing: 0.05em; margin-left: 4px; }
    .memo-field textarea { width: 100%; padding: 16px; border: none; border-radius: var(--radius-md); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; resize: vertical; min-height: 80px; background: var(--bg); color: var(--text); box-shadow: var(--clay-input); line-height: 1.6; transition: outline 0.2s; }
    .memo-field textarea::placeholder { color: var(--text-dim); }
    .memo-field textarea:focus { outline: 3px solid rgba(127,156,245,0.4); outline-offset: -2px; }
    .field-hint { font-size: 11px; font-weight: 500; color: var(--text-dim); margin-top: 8px; margin-left: 4px; }

    /* ─ Buttons ─ */
    .btn-row { display: flex; gap: 16px; margin-bottom: 40px; }
    .btn-generate { 
        flex: 1; padding: 18px; 
        background: var(--primary); 
        border: none; border-radius: 50px; 
        font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.08em; 
        cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
        box-shadow: 
            8px 8px 16px var(--shadow-dark), 
            -8px -8px 16px var(--shadow-light),
            inset -4px -4px 8px rgba(0,0,0,0.1),
            inset 4px 4px 8px rgba(255,255,255,0.4);
    }
    .btn-generate:hover { transform: translateY(-2px); }
    .btn-generate:active { 
        transform: translateY(2px);
        box-shadow: 
            4px 4px 8px var(--shadow-dark), 
            -4px -4px 8px var(--shadow-light),
            inset 4px 4px 8px rgba(0,0,0,0.1),
            inset -4px -4px 8px rgba(255,255,255,0.4);
    }
    .btn-reset { padding: 18px 24px; background: var(--bg); border: none; border-radius: 50px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; color: var(--text-sub); cursor: pointer; transition: transform 0.1s; box-shadow: var(--clay-btn); white-space: nowrap; }
    .btn-reset:active { box-shadow: var(--clay-btn-active); transform: scale(0.96); }

    /* ─ Loading ─ */
    #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(224, 229, 236, 0.75); backdrop-filter: blur(8px); z-index: 99; justify-content: center; align-items: center; flex-direction: column; gap: 24px; }
    .loader-ring { width: 56px; height: 56px; border: 6px solid var(--bg); border-top-color: var(--primary); border-right-color: var(--teal); border-radius: 50%; animation: spin 0.9s cubic-bezier(0.5, 0, 0.5, 1) infinite; box-shadow: var(--clay-card); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.1em; text-shadow: 2px 2px 4px var(--shadow-light); }

    /* ─ Result ─ */
    #result-area { display: none; }
    .combo-hero { background: var(--bg); border-radius: var(--radius-lg); padding: 32px 20px; text-align: center; margin-bottom: 32px; box-shadow: var(--clay-card); position: relative; overflow: hidden; }
    .combo-hero::after { content: '×'; position: absolute; font-size: 160px; font-weight: 900; color: rgba(163,177,198,0.1); top: -30px; left: 50%; transform: translateX(-50%); pointer-events: none; line-height: 1; text-shadow: inset 4px 4px 10px rgba(255,255,255,0.5); }
    .combo-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: var(--primary); text-transform: uppercase; margin-bottom: 16px; }
    .combo-text { font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: 0.05em; line-height: 1.5; position: relative; z-index: 1; }
    .combo-text .combo-x { color: var(--text-dim); margin: 0 12px; font-size: 20px; }
    .combo-memo { margin-top: 14px; font-size: 13px; font-weight: 500; color: var(--text-sub); min-height: 18px; }
    
    .result-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 4px; }
    .result-label { font-size: 13px; font-weight: 900; color: var(--text-sub); letter-spacing: 0.05em; display: flex; align-items: center; gap: 10px; }
    .result-label::before { content: ''; display: block; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.8); }
    .result-meta-btns { display: flex; gap: 12px; }
    .btn-meta { background: var(--bg); border: none; padding: 10px 16px; font-size: 12px; font-weight: 700; border-radius: 20px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.03em; box-shadow: var(--clay-btn); transition: transform 0.1s, color 0.2s; }
    .btn-meta:active { box-shadow: var(--clay-btn-active); transform: scale(0.96); }
    .btn-regen { color: var(--text-sub); }
    .btn-regen:hover { color: var(--primary); }
    .btn-copyall { color: var(--primary); }

    /* ─ Cards ─ */
    .cards-list { display: flex; flex-direction: column; gap: 24px; margin-bottom: 36px; }
    .idea-card { background: var(--bg); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--clay-card); animation: fadeUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    .idea-card:nth-child(2) { animation-delay: 0.1s; }
    .idea-card:nth-child(3) { animation-delay: 0.2s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    
    .card-head { padding: 24px 20px 16px; display: flex; align-items: flex-start; gap: 16px; }
    .card-icon { width: 44px; height: 44px; border-radius: 14px; background: var(--bg); box-shadow: var(--clay-input); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .card-icon.teal { color: var(--teal); }
    .card-icon.gold { color: var(--gold); }
    .card-icon.blue { color: var(--blue); }
    .card-head-info { flex: 1; min-width: 0; }
    .card-type-tag { font-size: 11px; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 6px; display: inline-block; padding: 4px 10px; border-radius: 12px; box-shadow: var(--clay-btn); background: var(--bg); }
    .card-type-tag.teal { color: var(--teal); }
    .card-type-tag.gold { color: var(--gold); }
    .card-type-tag.blue { color: var(--blue); }
    .card-title { font-size: 16px; font-weight: 900; color: var(--text); line-height: 1.5; margin-top: 8px; }
    .memo-badge { display: inline-block; background: var(--bg); box-shadow: var(--clay-btn); color: var(--primary); font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 8px; margin-left: 8px; letter-spacing: 0.05em; vertical-align: middle; }
    
    .card-body { padding: 0 20px 20px; }
    .card-row { display: flex; gap: 14px; margin-bottom: 16px; }
    .card-row:last-child { margin-bottom: 0; }
    .row-num { width: 24px; height: 24px; border-radius: 50%; background: var(--bg); box-shadow: var(--clay-btn); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: var(--text-sub); flex-shrink: 0; margin-top: 2px; }
    .row-text { font-size: 14px; font-weight: 500; line-height: 1.7; color: var(--text); }
    
    .card-foot { padding: 0 20px 24px; display: flex; justify-content: flex-end; gap: 12px; }
    .btn-card { background: var(--bg); border: none; padding: 10px 20px; font-size: 13px; font-weight: 700; border-radius: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.03em; box-shadow: var(--clay-btn); transition: transform 0.1s; }
    .btn-card:active { box-shadow: var(--clay-btn-active); transform: scale(0.96); }
    .btn-card-save { color: var(--text-sub); }
    .btn-card-copy.teal { color: var(--teal); }
    .btn-card-copy.gold { color: var(--gold); }
    .btn-card-copy.blue { color: var(--blue); }

    /* ─ Next block ─ */
    .next-block { background: var(--bg); border-radius: var(--radius-lg); padding: 28px 24px; margin-bottom: 40px; box-shadow: var(--clay-card); }
    .next-block-title { font-size: 13px; font-weight: 900; color: var(--text-sub); letter-spacing: 0.05em; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .next-block-title::before { content: ''; display: block; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.8); }
    .next-btn-list { display: flex; flex-direction: column; gap: 16px; }
    .btn-next { width: 100%; padding: 18px 20px; background: var(--bg); border: none; border-radius: var(--radius-md); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; gap: 12px; box-shadow: var(--clay-btn); transition: transform 0.1s; }
    .btn-next:active { box-shadow: var(--clay-btn-active); transform: scale(0.98); }
    .btn-next .next-label { flex: 1; line-height: 1.5; }
    .btn-next .next-label small { display: block; font-size: 12px; font-weight: 500; color: var(--text-sub); margin-top: 4px; }
    .btn-next .next-chip { background: var(--bg); border: none; color: var(--primary); font-size: 12px; font-weight: 900; padding: 6px 14px; border-radius: 20px; box-shadow: var(--clay-input); white-space: nowrap; }

    /* ─ Divider ─ */
    .section-divider { display: flex; align-items: center; gap: 16px; margin: 32px 0 24px; }
    .section-divider span { display: block; height: 3px; flex: 1; border-radius: 10px; box-shadow: var(--clay-input); }
    .section-divider i { font-style: normal; font-size: 12px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.1em; white-space: nowrap; text-shadow: 1px 1px 2px var(--shadow-light); }

    /* ─ Favorites ─ */
    .fav-section { position: relative; z-index: 1; margin-bottom: 20px; }
    .fav-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 16px 8px; user-select: none; }
    .fav-header-left { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 900; color: var(--text-sub); letter-spacing: 0.05em; }
    .fav-badge { background: var(--bg); box-shadow: var(--clay-btn); color: var(--primary); font-size: 12px; font-weight: 900; padding: 4px 12px; border-radius: 20px; }
    .fav-chevron { font-size: 12px; font-weight: 900; color: var(--text-dim); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .fav-chevron.open { transform: rotate(180deg); }
    .fav-list { display: none; flex-direction: column; gap: 20px; padding: 8px 4px 16px; }
    .fav-list.open { display: flex; }
    .fav-item { background: var(--bg); border: none; border-radius: var(--radius-md); padding: 20px; position: relative; box-shadow: var(--clay-card); }
    .fav-meta { font-size: 11px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.05em; margin-bottom: 8px; }
    .fav-title { font-size: 15px; font-weight: 900; color: var(--primary); margin-bottom: 8px; line-height: 1.5; padding-right: 32px; }
    .fav-desc { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.6; }
    .fav-foot { margin-top: 16px; }
    .btn-fav-copy { padding: 8px 16px; font-size: 12px; font-weight: 900; background: var(--bg); border: none; box-shadow: var(--clay-btn); border-radius: 10px; color: var(--primary); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: transform 0.1s; }
    .btn-fav-copy:active { box-shadow: var(--clay-btn-active); transform: scale(0.96); }
    .btn-fav-del { position: absolute; top: 16px; right: 16px; background: var(--bg); box-shadow: var(--clay-btn); width: 28px; height: 28px; border-radius: 50%; border: none; color: var(--text-dim); font-size: 16px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, color 0.2s; }
    .btn-fav-del:active { box-shadow: var(--clay-btn-active); transform: scale(0.9); }
    .btn-fav-del:hover { color: var(--rose); }

    /* ─ Footer ─ */
    footer { text-align: center; padding: 30px 20px; font-size: 12px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.05em; position: relative; z-index: 1; }
    footer .footer-rule { height: 3px; border-radius: 10px; box-shadow: var(--clay-input); margin-bottom: 24px; }

    /* ─ Toast ─ */
    .toast { visibility: hidden; position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--bg); border: none; color: var(--primary); padding: 14px 28px; border-radius: 50px; font-size: 14px; font-weight: 900; z-index: 200; opacity: 0; transition: opacity 0.3s, bottom 0.3s; white-space: nowrap; box-shadow: var(--clay-card); letter-spacing: 0.05em; }
    .toast.show { visibility: visible; opacity: 1; bottom: 48px; }

    /* ─ Scrollbar ─ */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 10px; border: 2px solid var(--bg); }
    </style>
</head>
<body>

<header class="site-header">
    <span class="header-kamon">🌱</span>
    <span class="header-en">Business Kakezan Lab</span>
    <h1>ビジネス掛け算ラボ</h1>
    <p class="tagline">業種と業種のあいだに、商売の芽をつくる</p>
    <div class="header-rule"><span></span><i>✦</i><span></span></div>
</header>

<div class="container">

    <div class="step-label">
        <div class="step-num">1</div>
        <div class="step-text">業種を選ぶ</div>
    </div>

    <div class="input-card">
        <div class="random-row">
            <button class="btn-random" onclick="setRandom()">🎲 おまかせランダム</button>
        </div>
        <div class="industry-row">
            <div class="field-group">
                <label>あなたの業種</label>
                <div class="select-wrap">
                    <select id="my-industry" onchange="onSel(this)">
                        <option value="" disabled selected>選択してください</option>
                    </select>
                </div>
            </div>
            <div class="times-wrap"><span class="times-symbol">×</span></div>
            <div class="field-group">
                <label>相手の業種</label>
                <div class="select-wrap">
                    <select id="partner-industry" onchange="onSel(this)">
                        <option value="" disabled selected>選択してください</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="memo-field">
            <label>💬 強み・状況メモ（任意）</label>
            <textarea id="memo" placeholder="例：30代女性向け、地元密着15年、親しみやすさが強みです"></textarea>
            <p class="field-hint">入力するとアイデアに反映されます（なくてもOK）</p>
        </div>
    </div>

    <div class="step-label" style="margin-top:12px;">
        <div class="step-num">2</div>
        <div class="step-text">掛け算する</div>
    </div>

    <div class="btn-row">
        <button class="btn-reset" onclick="resetForm()">↩ リセット</button>
        <button class="btn-generate" onclick="generate()">掛け算する ✦</button>
    </div>

    <section id="result-area">

        <div class="combo-hero">
            <div class="combo-eyebrow">— Result —</div>
            <div class="combo-text">
                <span id="combo-my"></span>
                <span class="combo-x">×</span>
                <span id="combo-partner"></span>
            </div>
            <div class="combo-memo" id="combo-memo"></div>
        </div>

        <div class="result-meta-row">
            <div class="result-label">アイデア 3案</div>
            <div class="result-meta-btns">
                <button class="btn-meta btn-regen" onclick="regen()">🔄 別パターン</button>
                <button class="btn-meta btn-copyall" onclick="copyAll()">📋 全コピー</button>
            </div>
        </div>

        <div class="cards-list" id="cards-container"></div>

            <div class="next-btn-list">

                    <span class="next-label">① 交流会翌日に送るメッセージ<small>LINE・メールにそのまま貼れる</small></span>

                </button>
                <button class="btn-next" onclick="copyMeetingMemo()">
                    <span class="next-label">② 商談前の自分メモ<small>メモ帳・Wordにそのまま貼れる</small></span>
                    <span class="next-chip">📝 コピー</span>
                </button>
                <button class="btn-next" onclick="copyProposalOutline()">
                    <span class="next-label">③ 提案書のたたき台（見出し構成）<small>ExcelやWordの章立てにそのまま使える</small></span>

    </section>

</div>

<div id="loading-overlay">
    <div class="loader-ring"></div>
    <div class="loading-msg" id="loading-msg">組み合わせを分析中...</div>
</div>

<div class="toast" id="toast"></div>

<script>
const industries = [
    "税理士","社労士","行政書士","司法書士","弁護士","中小企業診断士",
    "保険代理店","不動産仲介","工務店","リフォーム","設備工事",
    "製造業","金属加工","プラスチック加工","印刷","物流・運送",
    "IT開発","Web制作","Webマーケ","動画制作","写真撮影","デザイン",
    "飲食店","美容室","整体・整骨院","クリニック","介護事業",
    "教室・スクール","小売店","観光・宿泊","その他"
];
const industryKw = {
    "税理士":        {s:["数字管理","節税ノウハウ","経営分析","補助金知識"],p:["数字が苦手","申告の手間","キャッシュフロー不安","コスト感覚が鈍い"]},
    "社労士":        {s:["労務管理","助成金活用","採用サポート","社員定着"],p:["採用難","勤怠トラブル","退職リスク","規則が古い"]},
    "行政書士":      {s:["許可申請","書類整備","法令対応","外国人雇用"],p:["申請が複雑","書類ミス","手続きの遅れ","コンプライアンス不安"]},
    "保険代理店":    {s:["リスクマネジメント","補償設計","福利厚生提案","長期顧客関係"],p:["万一への不安","福利厚生の弱さ","事業継続リスク","損害対応の遅さ"]},
    "不動産仲介":    {s:["物件情報","立地分析","交渉力","市場動向"],p:["テナント探し","事務所移転","遊休スペース活用","コスト削減"]},
    "工務店":        {s:["施工技術","地域密着","アフターフォロー","職人ネットワーク"],p:["設備の老朽化","バリアフリー化","修繕費用","工期短縮ニーズ"]},
    "リフォーム":    {s:["空間改善提案","素材知識","短工期対応","デザイン力"],p:["職場環境の悪さ","イメージ刷新","集客スペースの改善","老朽化対策"]},
    "製造業":        {s:["高品質製品","カスタム対応","量産技術","品質管理"],p:["知名度の低さ","BtoC展開できない","職人不足","コスト圧力"]},
    "IT開発":        {s:["業務自動化","システム連携","データ活用","効率化提案"],p:["アナログ業務の多さ","情報管理の煩雑さ","業務の属人化","DX遅延"]},
    "Web制作":       {s:["集客導線設計","ブランディング","LP制作","SEO対策"],p:["集客できていない","古いホームページ","SNS更新の手間","差別化できない"]},
    "Webマーケ":     {s:["SNS運用","広告設計","コンテンツ企画","データ分析"],p:["新規顧客が増えない","認知度が低い","リピーターが増えない","口コミが広がらない"]},
    "動画制作":      {s:["映像演出","ストーリーテリング","ブランド表現","SNS最適化"],p:["魅力が伝わらない","動画がない","採用に弱い","ブランドが地味"]},
    "写真撮影":      {s:["視覚的魅力向上","商品撮影","空間撮影","プロフィール写真"],p:["写真が古い","商品の魅力が伝わらない","SNS映えしない","スタッフ紹介が弱い"]},
    "デザイン":      {s:["ブランド設計","視認性向上","信頼感UP","季節訴求"],p:["チラシが古い","ロゴが弱い","差別化できない","印刷物の統一感がない"]},
    "飲食店":        {s:["集客力","食体験","地域コミュニティ","テイクアウト需要"],p:["ランチ・宴会集客","個室・貸切ニーズ","地域のつながり強化","スタッフ研修"]},
    "美容室":        {s:["リラックス空間","接客力","女性顧客基盤","トレンド感"],p:["身だしなみ向上ニーズ","モチベーションUP","外見からの自信","採用時の印象"]},
    "整体・整骨院":  {s:["体の不調改善","健康習慣提案","疲労回復","姿勢改善"],p:["スタッフの腰痛","肉体労働疲れ","デスクワーク不調","健康経営ニーズ"]},
    "クリニック":    {s:["健康管理","産業医連携","予防医療","メンタルケア"],p:["従業員の体調管理","受診機会の少なさ","健診後のフォロー","休職リスク"]},
    "介護事業":      {s:["高齢者対応","地域包括ケア","家族支援","施設紹介"],p:["高齢スタッフ対応","介護離職リスク","働き手の高齢化","福祉制度の複雑さ"]},
    "教室・スクール":{s:["スキルアップ提案","研修カスタマイズ","資格取得支援","継続学習"],p:["スタッフのスキル不足","研修コスト","モチベーション維持","人材育成の仕組みがない"]},
    "小売店":        {s:["商品知識","地域密着仕入れ","体験型購買","ギフト対応"],p:["従業員へのギフトニーズ","備品の仕入れ","セールイベント","コスト削減"]},
    "物流・運送":    {s:["配送ネットワーク","緊急対応力","保管・在庫管理","多品目対応"],p:["資材搬入の手間","機材運搬","重量物移動","在庫スペース"]},
    "印刷":          {s:["紙媒体制作","データ入稿対応","小ロット対応","短納期"],p:["紙の情報ツールがない","マニュアル整備","チラシ量が多い","一括印刷コスト"]},
    "観光・宿泊":    {s:["体験設計","非日常空間","地域資源活用","インバウンド対応"],p:["社員旅行・レクリエーション","接待場所探し","研修合宿","感謝イベント場所"]},
};
const defKw = {s:["専門知識","地域密着","対応スピード","品質の高さ"],p:["認知不足","新規顧客獲得","継続的な関係構築","差別化の難しさ"]};
const cardDefs = [
    {color:"teal",icon:"🤝",type:"関係構築"},
    {color:"gold",icon:"📣",type:"集客連携"},
    {color:"blue",icon:"🔧",type:"課題解決"},
];
let currentResults = [], currentVariant = 0;

document.addEventListener('DOMContentLoaded', () => {
    ['my-industry','partner-industry'].forEach(id => {
        const el = document.getElementById(id);
        industries.forEach(n => { const o=document.createElement('option'); o.value=o.textContent=n; el.appendChild(o); });
    });
    loadFavs();
});

function onSel(el) { el.classList.toggle('selected', !!el.value); }

function setRandom() {
    let i1=Math.floor(Math.random()*industries.length), i2=Math.floor(Math.random()*industries.length);
    while(i2===i1) i2=Math.floor(Math.random()*industries.length);
    const my=document.getElementById('my-industry'), pt=document.getElementById('partner-industry');
    my.value=industries[i1]; pt.value=industries[i2]; [my,pt].forEach(s=>s.classList.add('selected'));
    const card=document.querySelector('.input-card');
    
    // クレイモーフィズム風の押下エフェクト
    card.style.transition='transform 0.1s'; 
    card.style.transform='scale(0.98)';
    setTimeout(()=>{ card.style.transform='scale(1)'; }, 150);
}

function generate() {
    const my=document.getElementById('my-industry').value, pt=document.getElementById('partner-industry').value;
    if(!my||!pt){ showToast('業種を2つ選んでください'); return; }
    currentVariant=0; showLoading(()=>renderResult(my,pt));
}
function regen() {
    const my=document.getElementById('my-industry').value, pt=document.getElementById('partner-industry').value;
    if(!my||!pt) return;
    currentVariant=(currentVariant+1)%4;
    const c=document.getElementById('cards-container');
    c.style.opacity='0.3'; c.style.transition='opacity 0.2s';
    setTimeout(()=>{ renderCards(my,pt); c.style.opacity='1'; }, 250);
    showToast('別パターンに切り替えました 🔄');
}
function showLoading(cb) {
    const ov=document.getElementById('loading-overlay'), mg=document.getElementById('loading-msg');
    ov.style.display='flex';
    const msgs=['組み合わせを分析中...','課題を抽出中...','アイデアを生成中...'];
    let i=0; const iv=setInterval(()=>{ if(i<msgs.length) mg.textContent=msgs[i++]; },480);
    setTimeout(()=>{ clearInterval(iv); ov.style.display='none'; mg.textContent='組み合わせを分析中...'; cb(); },1700);
}
function renderResult(my,pt) {
    const memo=document.getElementById('memo').value.trim();
    document.getElementById('combo-my').textContent=my;
    document.getElementById('combo-partner').textContent=pt;
    document.getElementById('combo-memo').textContent=memo?`💬 ${memo.slice(0,30)}`:'';
    const ra=document.getElementById('result-area'); ra.style.display='block';
    ra.scrollIntoView({behavior:'smooth',block:'start'}); renderCards(my,pt);
}
function buildIdeas(my,pt,memo,v) {
    const mk=industryKw[my]||defKw, pk=industryKw[pt]||defKw;
    const i=v%4, memoHint=memo?`（${memo.slice(0,18)}を活かして）`:'';
    return [
        { title:`「${pt}」の${pk.p[i%pk.p.length]}を${my}の${mk.s[i%mk.s.length]}で解決する勉強会${memoHint}`, problem:`${pt}は「${pk.p[i%pk.p.length]}」に困っていることが多い。${my}の${mk.s[i%mk.s.length]}はそこに直接役立てる`, action:`①${pt}向けに「${pk.p[i%pk.p.length]}あるある」を3つ書き出す　②${my}としての解決事例1件をA4一枚にまとめる　③交流会後に「30分勉強会しませんか？」と声かけする` },
        { title:`${my} × ${pt} の「お互い紹介カード」を作る${memoHint}`, problem:`${pt}の顧客は${my}も必要としているケースが多い。紹介し合う仕組みを作れば紹介コストゼロで新規獲得できる`, action:`①${pk.s[(i+1)%pk.s.length]}を活かして紹介できる場面を3つ書く　②${my}側の紹介カード（名刺サイズ）を作る　③「一緒に紹介し合いませんか」と提案する` },
        { title:`${pt}の顧客に刺さる「${my}の${mk.s[(i+2)%mk.s.length]}」提案書を作る`, problem:`${pt}顧客が抱える「${pk.p[(i+2)%pk.p.length]}」に${my}は${mk.s[(i+2)%mk.s.length]}で貢献できる。でも伝わっていないだけ`, action:`①${pt}がよく受ける相談トップ3を聞き出す　②${my}視点の解決策を1枚にまとめる　③「こんな時は紹介ください」と具体的な場面を伝える` },
    ];
}
function renderCards(my,pt) {
    const memo=document.getElementById('memo').value.trim();
    const c=document.getElementById('cards-container'); c.innerHTML='';
    currentResults=buildIdeas(my,pt,memo,currentVariant);
    currentResults.forEach((item,idx)=>{
        const cd=cardDefs[idx], hasMemo=memo&&idx===0;
        const card=document.createElement('div'); card.className=`idea-card ${cd.color}`; card.style.animationDelay=`${idx*0.09}s`;
        card.innerHTML=`<div class="card-head"><div class="card-icon ${cd.color}">${cd.icon}</div><div class="card-head-info"><div class="card-type-tag ${cd.color}">案${idx+1}　${cd.type}</div><div class="card-title">${item.title}${hasMemo?'<span class="memo-badge">メモ反映</span>':''}</div></div></div><div class="card-body"><div class="card-row"><div class="row-num">②</div><div class="row-text">${item.problem}</div></div><div class="card-row"><div class="row-num">③</div><div class="row-text">${item.action}</div></div></div><div class="card-foot"><button class="btn-card btn-card-save" onclick="saveFav(${idx})">保存</button><button class="btn-card btn-card-copy ${cd.color}" onclick="copyCard(${idx})">📋 コピー</button></div>`;
        c.appendChild(card);
    });
    window._copyData=currentResults.map((it,i)=>`【案${i+1}：${cardDefs[i].type}】\n①${it.title}\n②${it.problem}\n③${it.action}`);
}

function resetForm() {
    ['my-industry','partner-industry'].forEach(id=>{ const el=document.getElementById(id); el.value=''; el.classList.remove('selected'); });
    document.getElementById('memo').value=''; document.getElementById('result-area').style.display='none';
    window.scrollTo({top:0,behavior:'smooth'});
}

function clip(text) {
    const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;left:-9999px;top:0;';
    document.body.appendChild(ta); ta.focus(); ta.select(); try{ document.execCommand('copy'); }catch(e){} document.body.removeChild(ta);
}
function copyCard(idx) { if(!window._copyData) return; clip(window._copyData[idx]); showToast('コピーしました 📋'); }
function copyAll() {
    if(!window._copyData) return;
    const my=document.getElementById('my-industry').value, pt=document.getElementById('partner-industry').value;
    clip(`【ビジネス掛け算ラボ：${my} × ${pt}】\n\n`+window._copyData.join('\n\n')); showToast('全アイデアをコピーしました 📋');
}
function ctx() { return { my:document.getElementById('my-industry').value||'未選択', pt:document.getElementById('partner-industry').value||'未選択', memo:document.getElementById('memo').value.trim()||'なし' }; }

function copyLineMsg() {
    if(!currentResults.length){ showToast('先にアイデアを生成してください'); return; }
    const c=ctx(), it=currentResults[0];
    clip(`昨日はお会いできて嬉しかったです😊\n\n${c.my}をやっております、[お名前]と申します。\n\nお話の中で気になったのが「${it.problem.split('。')[0]}」という点でした。\n\nじつは私どもの${c.my}では、${it.title}という形でお役に立てるかもしれません。\n\nもし一度、30分ほどお時間いただけませんか？\nお会いした時間をビジネスにつなげたいと思っています。\n\nよろしければ来週中でご都合いかがでしょうか。\n\n[お名前]\n[連絡先]`);
    showToast('翌日メッセージをコピーしました 💬');
}
function copyMeetingMemo() {
    if(!currentResults.length){ showToast('先にアイデアを生成してください'); return; }
    const c=ctx();
    clip(`■ 商談前メモ　${new Date().toLocaleDateString('ja-JP')}\n━━━━━━━━━━━━━━━━━━\n自社：${c.my}　／　相手：${c.pt}\n補足：${c.memo}\n\n■ 今日の目標\n□ 相手の課題を1つ聞き出す\n□ 自社のアイデアを1つ伝える\n□ 次回アクションを決める\n\n■ 提案できる3つのアイデア\n${currentResults.map((it,i)=>`【案${i+1}：${cardDefs[i].type}】\n・${it.title}\n・解決できること：${it.problem}`).join('\n\n')}\n\n■ 相手への質問メモ（当日記入）\nQ1：\nQ2：\nQ3：\n\n■ 次のアクション（当日記入）\n□ \n━━━━━━━━━━━━━━━━━━`);
    showToast('商談前メモをコピーしました 📝');
}
function copyProposalOutline() {
    if(!currentResults.length){ showToast('先にアイデアを生成してください'); return; }
    const c=ctx();
    clip(`■ 提案書：${c.my} × ${c.pt} 連携提案\n　作成日：${new Date().toLocaleDateString('ja-JP')}\n━━━━━━━━━━━━━━━━━━\n\n【1】はじめに\n　・ご挨拶と提案の背景\n　・${c.my}として${c.pt}さまへできること\n\n【2】現状と課題\n　・${currentResults[0].problem}\n　・${currentResults[1].problem}\n\n【3】提案内容\n\n　▶ 提案①：${currentResults[0].title}\n　　${currentResults[0].action}\n\n　▶ 提案②：${currentResults[1].title}\n　　${currentResults[1].action}\n\n　▶ 提案③：${currentResults[2].title}\n　　${currentResults[2].action}\n\n【4】進め方イメージ\n　STEP1：まず顔合わせ（30分）\n　STEP2：お互いの事例共有\n　STEP3：小さく試す（1件からスタート）\n\n【5】お問い合わせ先\n　[社名]　[担当者名]\n　[連絡先]\n━━━━━━━━━━━━━━━━━━`);
    showToast('提案書たたき台をコピーしました 📄');
}

const FAV_KEY='bizLabFavsV3';
function getFavs(){ try{ return JSON.parse(localStorage.getItem(FAV_KEY))||[]; }catch{ return []; } }
function putFavs(f){ localStorage.setItem(FAV_KEY,JSON.stringify(f)); }
function saveFav(idx){ const it=currentResults[idx]; if(!it) return; const c=ctx(), f=getFavs(); f.unshift({title:it.title,problem:it.problem,action:it.action,context:`${c.my} × ${c.pt}`,time:new Date().toLocaleString(),type:cardDefs[idx].type}); putFavs(f); loadFavs(); showToast('お気に入りに保存しました 📂'); }
function deleteFav(idx){ if(!confirm('削除しますか？')) return; const f=getFavs(); f.splice(idx,1); putFavs(f); loadFavs(); showToast('削除しました'); }
function loadFavs(){
    const f=getFavs(); document.getElementById('fav-count').textContent=f.length;
    const list=document.getElementById('fav-list'); list.innerHTML='';
    if(!f.length){ list.innerHTML='<p style="text-align:center;color:var(--text-dim);padding:16px 0;font-size:13px;font-weight:700;">まだ保存はありません</p>'; return; }
    f.forEach((it,idx)=>{ const d=document.createElement('div'); d.className='fav-item'; d.innerHTML=`<button class="btn-fav-del" onclick="deleteFav(${idx})">×</button><div class="fav-meta">${it.time}　|　${it.context}　|　${it.type}</div><div class="fav-title">${it.title}</div><div class="fav-desc">${it.problem}</div><div class="fav-foot"><button class="btn-fav-copy" onclick="clip('①${it.title.replace(/'/g,"\\'")} ②${it.problem.replace(/'/g,"\\'")} ③${it.action.replace(/'/g,"\\'")}');showToast('コピーしました 📋')">📋 コピー</button></div>`; list.appendChild(d); });
}
function toggleFavs(){ const list=document.getElementById('fav-list'),icon=document.getElementById('fav-icon'); const o=list.classList.toggle('open'); icon.classList.toggle('open',o); }

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; setTimeout(()=>{ t.className='toast'; },3000); }
</script>
